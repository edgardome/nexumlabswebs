function scoreColor(v) { if (v <= 2) return 'score-lo'; if (v <= 3) return 'score-mid'; return 'score-hi'; }
function starsHtml(n) { if (n === 5.0) return '★★★★★'; if (n >= 4.5) return '★★★★☆'; if (n >= 4.0) return '★★★★☆'; return '★★★☆☆'; }

function renderCard(l) {
  const phoneLink = l.telefono ? `<a href="tel:+34${l.telefono.replace(/\s/g,'')}">📞 ${l.telefono}</a>` : '—';
  const emailLink = l.email ? `<a href="mailto:${l.email}">✉️ ${l.email}</a>` : '—';
  const webUrl = `https://edgardome.github.io/nexumlabswebs/${l.id}/`;

  const scoreItems = ['diseno','movil','velocidad','seo','ux','cta'].map(k => {
    const v = l.desglose[k];
    return `<div class="score-item"><span class="score-label">${k}</span><span class="score-val ${scoreColor(v)}">${v}</span></div>`;
  }).join('');

  const problemsHtml = l.problemas.map(p => `<li>${p}</li>`).join('');

  return `
  <div class="card" data-sector="${l.sector}" data-priority="${l.prioridad}" data-search="${l.nombre.toLowerCase()} ${l.sector.toLowerCase()} ${l.direccion.toLowerCase()}">
    <div class="card-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="card-header-left">
        <div class="card-sector">${l.sector}</div>
        <div class="card-name">${l.nombre}</div>
        <div class="card-meta">
          <span class="stars-display">${starsHtml(l.valoracion)}</span>
          <span>${l.valoracion} · ${l.resenas} reseñas</span>
          <span class="score-badge score-${l.scoring}">Scoring ${l.scoring}/10</span>
          <span class="priority-tag p-${l.prioridad}">${l.prioridad}</span>
        </div>
      </div>
      <div class="card-header-right">
        <a href="${webUrl}" class="link-btn accent" onclick="event.stopPropagation()" target="_blank">🌐 Ver web</a>
        <span class="expand-icon">▼</span>
      </div>
    </div>
    <div class="card-body">
      <div class="contact-row">
        <span class="contact-item">📍 ${l.direccion}</span>
        <span class="contact-item">${phoneLink}</span>
        <span class="contact-item">${emailLink}</span>
      </div>

      <div class="info-grid">
        <div class="info-block">
          <h4>📊 Scoring Original (sobre 10)</h4>
          <div class="score-row">${scoreItems}</div>
          <div style="margin-top:0.5rem;font-size:0.78rem;color:var(--text3);">Total: <b style="color:var(--text)">${l.scoring}/10</b></div>
        </div>
        <div class="info-block">
          <h4>💰 Facturación Estimada</h4>
          <div style="font-size:1.1rem;font-weight:700;color:var(--text);">${l.facturacion}</div>
          <div class="facturacion">${l.razon_facturacion}</div>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-block">
          <h4>⚠️ Problemas Detectados (web antigua)</h4>
          <ul class="problem-list">${problemsHtml}</ul>
        </div>
        <div class="info-block">
          <h4>🎯 Gancho para Email de Venta</h4>
          <div class="gancho-block">${l.gancho}</div>
        </div>
      </div>

      <div class="link-group">
        <a href="${webUrl}" class="link-btn accent" target="_blank">🌐 Web generada</a>
        <a href="${l.web_actual}" class="link-btn" target="_blank" rel="noopener">🔗 Web actual (original)</a>
        <a href="${l.google_maps}" class="link-btn" target="_blank" rel="noopener">📍 Google Maps</a>
      </div>
    </div>
  </div>`;
}

function renderAll(filterSector, searchTerm) {
  const grid = document.getElementById('cardsGrid');
  let filtered = leads;

  if (filterSector && filterSector !== 'all') {
    if (filterSector === 'Taller') filtered = leads.filter(l => l.sector.includes('Taller'));
    else if (filterSector === 'Inmobiliaria') filtered = leads.filter(l => l.sector.includes('Inmobiliaria'));
    else filtered = leads.filter(l => l.sector.includes(filterSector));
  }

  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    filtered = leads.filter(l =>
      l.nombre.toLowerCase().includes(s) ||
      l.sector.toLowerCase().includes(s) ||
      l.direccion.toLowerCase().includes(s) ||
      l.telefono.includes(s)
    );
  }

  grid.innerHTML = filtered.map(renderCard).join('');
}

function filterCards(sector) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelector('.search-input').value = '';
  renderAll(sector, '');
}

function searchCards(term) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (!term) document.querySelector('.filter-btn').classList.add('active');
  renderAll(term ? null : 'all', term);
}

// Init
renderAll('all', '');

// Open first card by default
setTimeout(() => {
  const first = document.querySelector('.card');
  if (first) first.classList.add('open');
}, 300);
</script>
